name: Web MVP Smoke Test

on:
  push:
    paths:
      - 'src/web-mvp/**'
      - '.github/workflows/web-mvp-smoke-test.yml'
  pull_request:
    paths:
      - 'src/web-mvp/**'
      - '.github/workflows/web-mvp-smoke-test.yml'
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Web MVP smoke test
        run: node src/web-mvp/tests/smoke-test.mjs
