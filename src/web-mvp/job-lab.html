<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>헌혈의 집 · 배치 육성소</title>
    <link rel="stylesheet" href="./job-lab.css" />
  </head>
  <body>
    <main class="lab-shell">
      <header class="lab-header">
        <p class="eyebrow">placement · job lab</p>
        <h1>배치 육성소</h1>
        <p>카드를 장소에 배치하면 그 작업에 따라 스탯이 재분배되고(총량 고정), 스탯 분포가 직업 후보를 만듭니다. 종족과 무관하게 어떤 직업이든 키울 수 있습니다.</p>
        <nav class="lab-nav">
          <a href="./index.html">운영 본부</a>
          <a href="./card-studio.html">카드 스튜디오</a>
          <a href="./battle-prototype.html">전투 프로토타입</a>
        </nav>
      </header>

      <section class="lab-card">
        <div class="card-id-row">
          <label>종족
            <select id="race-select"></select>
          </label>
          <label>등급
            <select id="grade-select"></select>
          </label>
          <button id="reset" class="btn-ghost">초기화</button>
        </div>
        <div class="budget-row">
          <span>스탯 총량(고정)</span>
          <strong id="budget-val"></strong>
          <span id="budget-check" class="budget-check"></span>
          <span class="lock-info" id="lock-info"></span>
        </div>
        <div id="stat-list" class="stat-list"></div>
      </section>

      <section class="lab-locations">
        <h2>맵 장소에 배치 (작업 수행 → 스탯 이동)</h2>
        <div id="location-list" class="location-list"></div>
      </section>

      <section class="lab-jobs">
        <h2>직업 후보 (스탯 분포로 자동 산출)</h2>
        <div id="selected-job" class="selected-job"></div>
        <div id="job-list" class="job-list"></div>
      </section>
    </main>
    <script src="./job-lab.js"></script>
  </body>
</html>
